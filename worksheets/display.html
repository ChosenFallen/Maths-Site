<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Display Worksheet</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
        />
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="stylesheet" href="worksheet.css" />
        <link rel="stylesheet" href="display.css" />
    </head>
    <body>
        <!-- Shared menu -->
        <div id="menu-container"></div>

        <h1 class="worksheet-title">📺 Display Worksheet</h1>
        <h1 id="print-title" class="print-title"></h1>

        <div id="worksheet-options">
            <label>Worksheet Code:</label>
            <div class="code-input-row">
                <input
                    type="text"
                    id="worksheet-code"
                    placeholder="Paste worksheet code here (e.g., as6f3xl6|addition|easy|20)"
                />
                <button id="load-worksheet-btn">Load Worksheet</button>
            </div>
            <p class="display-info">
                Enter a worksheet code to display it on screen. You can copy the
                code from the worksheet generator page.
            </p>
        </div>

        <div style="text-align: center; margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;">
            <button
                id="reveal-all-btn"
                style="
                    padding: 8px 16px;
                    background: #0066cc;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 13px;
                    font-weight: bold;
                    display: none;
                "
            >
                Reveal All Answers
            </button>
            <button
                id="fullscreen-btn"
                style="
                    padding: 8px 16px;
                    background: #0066cc;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 13px;
                    font-weight: bold;
                    display: none;
                "
            >
                Fullscreen
            </button>
            <div id="size-controls" style="display: none; display: flex; gap: 8px; align-items: center;">
                <button
                    id="text-smaller-btn"
                    title="Decrease text size"
                    style="
                        padding: 8px 12px;
                        background: #e2e6ef;
                        color: #263042;
                        border: 1px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 16px;
                        font-weight: bold;
                    "
                >
                    −
                </button>
                <span
                    id="text-size-display"
                    style="
                        font-weight: 600;
                        color: #333;
                        min-width: 40px;
                        text-align: center;
                    "
                >
                    100%
                </span>
                <button
                    id="text-larger-btn"
                    title="Increase text size"
                    style="
                        padding: 8px 12px;
                        background: #e2e6ef;
                        color: #263042;
                        border: 1px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 16px;
                        font-weight: bold;
                    "
                >
                    +
                </button>
            </div>
            <div id="color-buttons" style="display: none; display: flex; gap: 8px; flex-wrap: wrap;">
                <button
                    class="color-preset"
                    data-color="#ffffff"
                    title="White"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #ffffff;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#F5F5F0"
                    title="Cream (dyslexia-friendly)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #F5F5F0;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#FEF3C7"
                    title="Pale Yellow (warm)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #FEF3C7;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#FFFFA7"
                    title="Pale Yellow (dyslexia-friendly)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #FFFFA7;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#FFE4B5"
                    title="Peach (improves readability)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #FFE4B5;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#E6F2FF"
                    title="Light Blue"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #E6F2FF;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#E0F2FE"
                    title="Light Blue (cool)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #E0F2FE;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
            </div>
        </div>

        <p id="worksheet-instruction" class="worksheet-instruction"></p>
        <div id="worksheet-output" class="worksheet-output"></div>

        <p><a href="index.html">⬅ Back to generator</a></p>

        <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
        <script type="module" src="display.js"></script>
    </body>
</html>
