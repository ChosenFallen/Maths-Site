<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Display Worksheet</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
        />
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="stylesheet" href="worksheet.css" />
        <style>
            /* Display mode optimizations for classroom projection */
            :root {
                --bg-color: white;
            }

            body {
                margin: 0;
                padding: 0;
                background: white;
                user-select: none;
                cursor: default;
            }

            #worksheet-code {
                user-select: text;
                cursor: text;
            }

            body:fullscreen {
                background: white;
            }

            body:-webkit-full-screen {
                background: white;
            }

            .problem-answer-box::before {
                top: 0px;
                background: var(--bg-color);
            }

            #menu-container,
            h1.print-title,
            #worksheet-options,
            #worksheet-instruction,
            a {
                padding-left: 10px;
                padding-right: 10px;
            }

            h1.print-title,
            #worksheet-options,
            #worksheet-instruction {
                /* padding-top: 10px; */
                /* padding-bottom: 10px; */
            }

            h1.worksheet-title {
                display: none;
            }

            h1.print-title {
                text-align: center;
                font-size: 40px;
                margin: 10px 0 20px 0;
                color: #333;
            }

            #worksheet-options {
                background: #f0f0f0;
                padding: 12px;
                border-radius: 6px;
                margin-bottom: 15px;
            }

            .code-input-row {
                display: flex;
                gap: 8px;
                margin-bottom: 10px;
            }

            #worksheet-code {
                flex: 1;
                padding: 8px;
                font-family: monospace;
                font-size: 12px;
                border: 2px solid #999;
                border-radius: 4px;
            }

            #load-worksheet-btn {
                padding: 8px 16px;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 13px;
                font-weight: bold;
            }

            #load-worksheet-btn:hover {
                background: #0056b3;
            }

            .display-info {
                font-size: 11px;
                color: #666;
                margin: 8px 0 0 0;
            }

            #worksheet-instruction {
                font-size: 28px;
                margin: 15px 0 10px 0;
                text-align: center;
                font-weight: bold;
                color: #222;
            }

            #worksheet-output {
                padding: 0 10px 10px 10px;
                margin: 0 !important;
                width: 100%;
                max-width: none !important;
                box-sizing: border-box;
            }

            /* Optimize problems grid for display */
            .problems-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 15px;
                margin: 0;
                padding: 0;
                width: 100%;
                box-sizing: border-box;
            }

            .problem-item {
                background: white;
                border: 2px solid #ddd;
                border-radius: 6px;
                padding: 15px;
                min-height: auto;
                display: flex;
                flex-direction: column;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .problem-number {
                font-weight: bold;
                font-size: 15px;
                color: #fff;
                /* margin-bottom: 10px; */
            }

            .problem-question {
                flex-grow: 0;
                font-size: 24px;
                font-weight: 500;
                /* margin-bottom: 12px; */
                color: #111;
                line-height: 1.5;
                word-spacing: 0.05em;
            }

            .problem-question svg {
                max-width: 100%;
                max-height: 180px;
                margin: 8px 0;
            }

            .problem-answer-box {
                height: auto !important;
                min-height: auto !important;
                padding: 0 !important;
                margin: 0 !important;
                background: none !important;
                border: none !important;
                box-shadow: none !important;
            }

            /* Hide answer key on screen */
            .answers {
                display: none !important;
            }

            /* Responsive for different screen sizes */
            @media (max-width: 1200px) {
                .problems-grid {
                    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                    gap: 12px;
                }
                .problem-item {
                    padding: 14px;
                    min-height: 200px;
                }
                .problem-question {
                    font-size: 20px;
                }
            }

            @media (max-width: 768px) {
                .problems-grid {
                    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                    gap: 10px;
                }
                .problem-item {
                    padding: 12px;
                    min-height: 200px;
                }
                .problem-question {
                    font-size: 18px;
                }
            }

            /* Extra large screens */
            @media (min-width: 1600px) {
                .problem-question {
                    font-size: 28px;
                }
                .problems-grid {
                    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                }
            }

            a {
                font-size: 12px;
                margin-top: 10px;
                display: inline-block;
            }

            @media print {
                #worksheet-options,
                a {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <!-- Shared menu -->
        <div id="menu-container"></div>

        <h1 class="worksheet-title">📺 Display Worksheet</h1>
        <h1 id="print-title" class="print-title"></h1>

        <div id="worksheet-options">
            <label>Worksheet Code:</label>
            <div class="code-input-row">
                <input
                    type="text"
                    id="worksheet-code"
                    placeholder="Paste worksheet code here (e.g., as6f3xl6|addition|easy|20)"
                />
                <button id="load-worksheet-btn">Load Worksheet</button>
            </div>
            <p class="display-info">
                Enter a worksheet code to display it on screen. You can copy the
                code from the worksheet generator page.
            </p>
        </div>

        <div style="text-align: center; margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button
                id="reveal-all-btn"
                style="
                    padding: 8px 16px;
                    background: #0066cc;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 13px;
                    font-weight: bold;
                    display: none;
                "
            >
                Reveal All Answers
            </button>
            <button
                id="fullscreen-btn"
                style="
                    padding: 8px 16px;
                    background: #0066cc;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 13px;
                    font-weight: bold;
                    display: none;
                "
            >
                Fullscreen
            </button>
            <div id="color-buttons" style="display: none; display: flex; gap: 8px; flex-wrap: wrap;">
                <button
                    class="color-preset"
                    data-color="#ffffff"
                    title="White"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #ffffff;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#F5F5F0"
                    title="Cream (dyslexia-friendly)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #F5F5F0;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#FFFFA7"
                    title="Pale Yellow (dyslexia-friendly)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #FFFFA7;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#FFE4B5"
                    title="Peach (improves readability)"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #FFE4B5;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
                <button
                    class="color-preset"
                    data-color="#E6F2FF"
                    title="Light Blue"
                    style="
                        width: 36px;
                        height: 36px;
                        padding: 0;
                        background: #E6F2FF;
                        border: 2px solid #999;
                        border-radius: 4px;
                        cursor: pointer;
                    "
                ></button>
            </div>
        </div>

        <p id="worksheet-instruction" class="worksheet-instruction"></p>
        <div id="worksheet-output" class="worksheet-output"></div>

        <p><a href="index.html">⬅ Back to generator</a></p>

        <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
        <script type="module" src="display.js"></script>
    </body>
</html>
